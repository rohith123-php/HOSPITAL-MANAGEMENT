<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">⚙️ Admin Portal</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="../index.html">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="title-gradient mb-4">System Overview</h2>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card shadow-sm border-0 bg-primary text-white mb-4">
                    <div class="card-body text-center">
                        <h4>Manage Doctors</h4>
                        <button class="btn btn-light mt-2 btn-sm">View All</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm border-0 bg-info text-white mb-4">
                    <div class="card-body text-center">
                        <h4>Manage Patients</h4>
                        <button class="btn btn-light mt-2 btn-sm">View All</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm border-0 bg-success text-white mb-4">
                    <div class="card-body text-center">
                        <h4>Appointments</h4>
                        <button class="btn btn-light mt-2 btn-sm">Approve</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm border-0 bg-secondary text-white mb-4">
                    <div class="card-body text-center">
                        <h4>Reports</h4>
                        <button class="btn btn-light mt-2 btn-sm">Generate</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
